<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BiteRight — Sign In</title>
<link rel="stylesheet" href="/static/style.css"/>
<style>
.login-wrap { min-height:calc(100vh - 64px); display:flex;align-items:center;justify-content:center; padding:40px 24px;
  background: radial-gradient(ellipse 60% 60% at 80% 20%,rgba(255,77,0,0.10) 0%,transparent 60%),
              radial-gradient(ellipse 40% 50% at 10% 80%,rgba(255,190,0,0.07) 0%,transparent 60%), var(--bg); }
.login-card { width:100%;max-width:460px; background:var(--surface);border:1px solid var(--border); border-radius:var(--radius-lg);padding:44px 40px; animation:fadeUp 0.5s ease both; }
.login-header { text-align:center;margin-bottom:36px; }
.login-logo { font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;margin-bottom:8px; }
.login-logo span { color:var(--primary); }
.login-tagline { font-size:0.92rem;color:var(--text2); }
.login-form { display:flex;flex-direction:column;gap:20px; }
.diet-options { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
.diet-option { position:relative; }
.diet-option input[type="radio"] { position:absolute;opacity:0; }
.diet-option label { display:flex;align-items:center;justify-content:center;gap:7px; padding:10px;border-radius:var(--radius-sm); border:1.5px solid var(--border);background:var(--surface2); cursor:pointer;font-size:0.88rem;font-weight:500;transition:var(--transition); }
.diet-option input:checked + label { border-color:var(--primary);background:var(--primary-glow);color:var(--primary); }
.user-card { background:var(--surface2);border:1px solid var(--border-hot); border-radius:var(--radius);padding:20px; display:none;flex-direction:column;gap:12px; }
.user-card.visible { display:flex; }
.alert-banner { background:var(--primary-glow);border:1px solid var(--border-hot); border-radius:var(--radius-sm);padding:12px 16px; font-size:0.88rem;color:var(--primary); display:flex;align-items:center;gap:8px; }
@media (max-width:480px) { .login-card { padding:32px 24px; } }
</style>
</head>
<body>
<nav class="nav">
  <a href="/index.html" class="nav-logo">🔥<span>Bite</span>Right</a>
</nav>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🔥<span>Bite</span>Right</div>
      <div class="login-tagline">Tell us about yourself and we'll serve up the good stuff</div>
    </div>

    <div class="user-card" id="userCard">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem" id="ucName"></div>
      <div style="font-size:0.85rem;color:var(--text2)" id="ucDetail"></div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <a id="ucContinueBtn" href="/restaurants.html" class="btn btn-primary btn-sm">Continue →</a>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Log out</button>
      </div>
    </div>

    <form class="login-form" id="loginForm">
      <div id="alertBanner" class="alert-banner hidden">
        🔒 Please create a profile to continue exploring BiteRight
      </div>
      <div class="form-group">
        <label class="form-label">Your name</label>
        <input type="text" class="form-input" id="nameInput" placeholder="e.g. Priya Sharma" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="emailInput" placeholder="you@example.com" required/>
        <small style="color:var(--text3);font-size:0.78rem">Already registered? We'll log you back in automatically.</small>
      </div>
      <div class="form-group">
        <label class="form-label">Allergies <span style="color:var(--text3);font-weight:400;text-transform:none">(comma-separated)</span></label>
        <input type="text" class="form-input" id="allergyInput" placeholder="e.g. peanuts, shellfish"/>
      </div>
      <div class="form-group">
        <label class="form-label" style="margin-bottom:10px">Diet preference</label>
        <div class="diet-options">
          <div class="diet-option"><input type="radio" name="diet" id="diet-veg"    value="vegetarian"/><label for="diet-veg">🌿 Vegetarian</label></div>
          <div class="diet-option"><input type="radio" name="diet" id="diet-nonveg" value="non-vegetarian"/><label for="diet-nonveg">🍖 Non-Veg</label></div>
          <div class="diet-option"><input type="radio" name="diet" id="diet-vegan"  value="vegan"/><label for="diet-vegan">🥦 Vegan</label></div>
          <div class="diet-option"><input type="radio" name="diet" id="diet-any"    value="no-preference" checked/><label for="diet-any">🍽️ No preference</label></div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
        Create Profile & Start Eating 🚀
      </button>
    </form>
  </div>
</div>

<script type="module">
import { User, toast } from '/static/app.js';
import { createUser }  from '/static/api.js';

const params        = new URLSearchParams(location.search);
const nextPage      = params.get('next') || '/index.html';
const wasRedirected = !!params.get('next');

if (wasRedirected) document.getElementById('alertBanner').classList.remove('hidden');

const existingUser = User.get();
if (existingUser) {
  const card = document.getElementById('userCard');
  document.getElementById('ucName').textContent   = `Welcome back, ${existingUser.name}! 👋`;
  document.getElementById('ucDetail').textContent =
    `${existingUser.email} · ${existingUser.diet_preferences || 'No preference'} · Allergies: ${existingUser.allergies || 'None'}`;
  document.getElementById('ucContinueBtn').href = nextPage;
  card.classList.add('visible');
  document.getElementById('loginForm').style.display = 'none';
}

document.getElementById('logoutBtn')?.addEventListener('click', () => {
  User.clear();
  toast('Logged out. See you soon!', 'info');
  location.reload();
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Creating profile…';

  const diet    = document.querySelector('input[name="diet"]:checked')?.value || '';
  const payload = {
    name:             document.getElementById('nameInput').value.trim(),
    email:            document.getElementById('emailInput').value.trim(),
    allergies:        document.getElementById('allergyInput').value.trim(),
    diet_preferences: diet,
  };

  try {
    const user = await createUser(payload);
    if (!user || !user.id) throw new Error('Server returned an unexpected response. Try again.');
    User.set(user);
    toast(`Welcome, ${user.name}! 🎉`, 'success');
    setTimeout(() => location.href = nextPage, 900);
  } catch (err) {
    toast(`Error: ${err.message}`, 'error');
    btn.disabled = false;
    btn.textContent = 'Create Profile & Start Eating 🚀';
  }
});
</script>
</body>
</html>
