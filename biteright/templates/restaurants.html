<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BiteRight — Restaurants</title>
<link rel="stylesheet" href="/static/style.css"/>
<style>
.page-hero { background:linear-gradient(135deg,var(--bg2) 0%,var(--surface) 100%); border-bottom:1px solid var(--border); padding:48px 24px 40px; }
.page-hero-inner { max-width:1200px;margin:0 auto; }
.page-hero h1 { font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.8rem,4vw,2.6rem);margin-bottom:8px; }
.page-hero p  { color:var(--text2);font-size:1rem;margin-bottom:28px; }
.filter-bar   { display:flex;gap:10px;flex-wrap:wrap; }
.filter-btn   { padding:8px 18px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:var(--transition); }
.filter-btn:hover,.filter-btn.active { border-color:var(--primary);color:var(--primary);background:var(--primary-glow); }
.rest-card { text-decoration:none;display:block;color:inherit; }
.rest-img  { height:180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:4.5rem;background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%); }
.rest-img-badge { position:absolute;top:12px;right:12px;background:rgba(14,12,10,0.75);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:50px;padding:4px 10px;font-size:0.75rem;font-weight:600;color:var(--accent); }
.rest-body { padding:18px; }
.rest-name    { font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:5px; }
.rest-cuisine { font-size:0.82rem;color:var(--text2);margin-bottom:10px; }
.rest-meta    { display:flex;gap:14px;margin-bottom:14px; }
.rest-meta-item { font-size:0.8rem;color:var(--text2);display:flex;align-items:center;gap:4px; }
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="page-hero">
  <div class="page-hero-inner">
    <h1 class="fade-up">🍽️ All Restaurants</h1>
    <p class="fade-up-d1">Discover great food near you</p>
    <div class="search-bar fade-up-d2" style="max-width:500px;margin-bottom:20px">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search restaurants…"/>
    </div>
    <div class="filter-bar fade-up-d3" id="filterBar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="veg">🌿 Veg Friendly</button>
      <button class="filter-btn" data-filter="fast">⚡ Fast Delivery</button>
      <button class="filter-btn" data-filter="top">⭐ Top Rated</button>
    </div>
  </div>
</div>

<main class="page">
  <div class="grid-auto" id="restGrid"><div class="loader-wrap" style="grid-column:1/-1"><div class="spinner"></div></div></div>
</main>

<div id="float-root"></div>
<script type="module">
import { renderNav, renderFloatCart, Cart, toast, requireAuth } from '/static/app.js';
import { getRestaurants } from '/static/api.js';

document.getElementById('nav-root').innerHTML   = renderNav('/restaurants.html');
document.getElementById('float-root').innerHTML = renderFloatCart();
Cart.init();
if (!requireAuth()) throw new Error('redirect');

const EMOJIS   = ['🍕','🍜','🍛','🥗','🍔','🌮','🥘','🍱','🍝','🍲','🍣','🥙'];
const CUISINES = ['Indian','Chinese','Italian','Mexican','Thai','Japanese','Mediterranean','American'];
let allRestaurants = [];

function renderCard(r, i) {
  const rating  = r.rating || (4 + Math.random()).toFixed(1);
  const time    = r.delivery_time || "25-35 min";
  const cuisine = r.cuisine_type || CUISINES[i % CUISINES.length];
  const loc     = r.location || "Nearby";
  return `
  <a class="card rest-card fade-up" href="menu.html?restaurant=${r.id}&name=${encodeURIComponent(r.name||'Restaurant')}">
    <div class="rest-img">${EMOJIS[i%EMOJIS.length]}<div class="rest-img-badge">⭐ ${rating}</div></div>
    <div class="rest-body">
      <div class="flex-between mb-8">
        <div class="rest-name">${r.name||'Restaurant'}</div>
      </div>
      <div class="rest-cuisine">${cuisine}</div>
      <div class="rest-meta">
        <div class="rest-meta-item">🕐 ${time}</div>
        <div class="rest-meta-item">📍 ${loc}</div>
      </div>
      <div class="mt-16" style="border-top: 1px solid var(--border); padding-top:12px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:0.75rem; color:var(--text3); font-weight:600">DELIVERING NOW</span>
        <span class="btn btn-ghost btn-sm" style="padding:4px 12px; pointer-events:none">Menu →</span>
      </div>
    </div>
  </a>`;
}

const grid = document.getElementById('restGrid');
try {
  allRestaurants = await getRestaurants();
  grid.innerHTML = allRestaurants.map((r,i) => renderCard(r,i)).join('') ||
    `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🍽️</div><h3>No restaurants found</h3></div>`;
} catch {
  grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><h3>Failed to load</h3><p>Make sure the backend is running</p></div>`;
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q        = this.value.toLowerCase();
  const filtered = allRestaurants.filter(r => (r.name||'').toLowerCase().includes(q));
  grid.innerHTML = filtered.map((r,i) => renderCard(r,i)).join('') ||
    `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>No matches for "${this.value}"</h3></div>`;
});

document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn'); if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});
</script>
</body>
</html>
