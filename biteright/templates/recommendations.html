<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BiteRight — For You</title>
<link rel="stylesheet" href="/static/style.css"/>
<style>
.rec-hero { background:linear-gradient(135deg,rgba(255,77,0,0.12),rgba(255,190,0,0.07),var(--bg)); border-bottom:1px solid var(--border); padding:52px 24px 40px;text-align:center; }
.rec-hero h1 { font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.8rem,4vw,2.8rem);margin-bottom:8px; }
.rec-hero p  { color:var(--text2);font-size:1rem; }
.selector-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:12px; }
.selector-card { background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 14px;text-align:center;cursor:pointer;transition:var(--transition); }
.selector-card:hover { border-color:var(--c,var(--primary));transform:translateY(-3px); }
.selector-card.selected { border-color:var(--c,var(--primary)); background:color-mix(in srgb,var(--c,var(--primary)) 10%,var(--surface2)); box-shadow:0 4px 20px color-mix(in srgb,var(--c,var(--primary)) 20%,transparent); }
.sel-emoji { font-size:2rem;margin-bottom:8px; }
.sel-label { font-weight:600;font-size:0.88rem; }
.rec-config { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;margin-bottom:32px; }
.rec-section-label { font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:16px; }
.rest-select-wrap { position:relative; }
.rest-select-wrap::after { content:'▾';position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none; }
.dish-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden; }
.dish-img-wrap { height:130px;background:linear-gradient(135deg,var(--surface),var(--surface2));display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative; }
.dish-dot { position:absolute;top:10px;left:10px;width:14px;height:14px;border-radius:50%; }
.dish-dot.veg    { background:#2ECC71; }
.dish-dot.nonveg { background:#E74C3C; }
.dish-body    { padding:16px; }
.dish-name    { font-family:'Syne',sans-serif;font-weight:700;font-size:0.98rem; }
.dish-tags    { display:flex;gap:6px;flex-wrap:wrap;margin:8px 0; }
.dish-price   { font-size:1.1rem;font-weight:700;color:var(--primary); }
.dish-actions { display:flex;gap:8px;margin-top:12px; }
.score-bar  { height:4px;background:var(--surface2);border-radius:2px;margin-top:10px;overflow:hidden; }
.score-fill { height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width 0.8s ease; }
@media (max-width:640px) { .selector-grid{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>
<div id="nav-root"></div>

<div class="rec-hero">
  <h1 class="fade-up">🤖 Personalized For You</h1>
  <p class="fade-up-d1">Pick your mood & time — we'll find your perfect dish</p>
</div>

<main class="page">
  <div id="content"></div>
</main>

<div id="float-root"></div>
<script type="module">
import { renderNav, renderFloatCart, Cart, User, MOODS, TIMES, toast, bindCartButtons, dishCard, requireAuth } from '/static/app.js';
import { getRestaurants, getRecommendations } from '/static/api.js';

document.getElementById('nav-root').innerHTML   = renderNav('/recommendations.html');
document.getElementById('float-root').innerHTML = renderFloatCart();
Cart.init();
if (!requireAuth()) throw new Error('redirect');

const params        = new URLSearchParams(location.search);
const presetMood    = params.get('mood') || '';
const presetRest    = params.get('restaurant') || '';

const content = document.getElementById('content');
const user    = User.get();

if (!user) {
  content.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border-hot);border-radius:var(--radius-lg);padding:40px;text-align:center">
      <div style="font-size:3rem;margin-bottom:16px">🔒</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:1.5rem;margin-bottom:8px">Create your profile first</h2>
      <p style="color:var(--text2);margin-bottom:24px">We need to know your preferences to give you great picks.</p>
      <a href="login.html" class="btn btn-primary btn-lg">Create Profile →</a>
    </div>`;
} else {
  let selectedMood   = presetMood;
  let selectedTime   = 'afternoon';
  let selectedRestId = presetRest;
  let restaurants    = [];

  try {
    restaurants = await getRestaurants();
  } catch {}

  const restOptions = restaurants.map(r =>
    `<option value="${r.id}" ${r.id == presetRest ? 'selected' : ''}>${r.name}</option>`
  ).join('');

  content.innerHTML = `
    <div class="rec-config fade-up">
      <div class="mb-24">
        <div class="rec-section-label">1. Choose your mood</div>
        <div class="selector-grid" id="moodSel">
          ${MOODS.map(m => `
            <div class="selector-card ${m.id===selectedMood?'selected':''}" data-mood="${m.id}" style="--c:${m.color}">
              <div class="sel-emoji">${m.emoji}</div>
              <div class="sel-label">${m.label}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="mb-24">
        <div class="rec-section-label">2. Time of day</div>
        <div class="selector-grid" id="timeSel">
          ${TIMES.map(t => `
            <div class="selector-card ${t.id===selectedTime?'selected':''}" data-time="${t.id}" style="--c:var(--accent)">
              <div class="sel-emoji">${t.emoji}</div>
              <div class="sel-label">${t.label}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="mb-24">
        <div class="rec-section-label">3. Choose a restaurant</div>
        <div class="rest-select-wrap">
          <select class="form-select" id="restSel" style="padding-right:40px">
            <option value="">— Select a restaurant —</option>
            ${restOptions}
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-lg" id="getRecBtn" style="min-width:240px">
        🤖 Get My Recommendations
      </button>
    </div>
    <div id="recResults"></div>`;

  document.getElementById('moodSel').addEventListener('click', e => {
    const c = e.target.closest('[data-mood]'); if(!c) return;
    document.querySelectorAll('#moodSel [data-mood]').forEach(el => el.classList.remove('selected'));
    c.classList.add('selected');
    selectedMood = c.dataset.mood;
  });

  document.getElementById('timeSel').addEventListener('click', e => {
    const c = e.target.closest('[data-time]'); if(!c) return;
    document.querySelectorAll('#timeSel [data-time]').forEach(el => el.classList.remove('selected'));
    c.classList.add('selected');
    selectedTime = c.dataset.time;
  });

  document.getElementById('restSel').addEventListener('change', function() { selectedRestId = this.value; });
  if (presetRest) selectedRestId = presetRest;

  document.getElementById('getRecBtn').addEventListener('click', async () => {
    if (!selectedMood)   { toast('Pick a mood first!',    'error'); return; }
    if (!selectedRestId) { toast('Pick a restaurant!',    'error'); return; }

    const btn = document.getElementById('getRecBtn');
    btn.disabled = true;
    btn.textContent = 'Finding your dishes…';

    const results = document.getElementById('recResults');
    results.innerHTML = `<div class="loader-wrap"><div class="spinner"></div><p style="color:var(--text2)">Crunching AI picks just for you…</p></div>`;

    try {
      const data     = await getRecommendations(user.id, selectedRestId, selectedMood, selectedTime);
      const items    = data.recommended_items || data || [];
      const restName = restaurants.find(r => r.id == selectedRestId)?.name || 'Restaurant';

      results.innerHTML = `
        <div class="section-head mb-24">
          <div>
            <div class="section-title">Your AI Picks ✨</div>
            <div class="section-sub">${items.length} dish${items.length===1?'':'es'} ranked for ${selectedMood} mood · ${selectedTime}</div>
          </div>
        </div>
        <div class="grid-auto" id="recGrid">
          ${items.map((d, i) => dishCard(d, selectedRestId, restName, {showAllergy:true, rank:i+1})).join('') ||
          '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🤔</div><h3>No recommendations found</h3><p>Try a different mood or restaurant</p></div>'}
        </div>`;
      bindCartButtons(document.getElementById('recGrid'));
    } catch (e) {
      results.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>Failed to get recommendations</h3><p>${e.message}</p></div>`;
    }
    btn.disabled = false;
    btn.textContent = '🤖 Get My Recommendations';
  });

  if (presetMood && presetRest) {
    setTimeout(() => document.getElementById('getRecBtn').click(), 300);
  }
}
</script>
</body>
</html>
